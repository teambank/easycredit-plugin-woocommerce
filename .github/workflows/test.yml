name: Test

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      matrix:
        description: 'WooCommerce version matrix'
        type: choice
        options:
          - reduced
          - full
        default: reduced

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.matrix.outputs.versions }}
      fail-fast: ${{ steps.matrix.outputs.fail-fast }}
    steps:
      - id: matrix
        run: |
          FULL_VERSIONS='[
            {"php-version":"8.0","wordpress-version":"5.9.5","woocommerce-version":"6.9.4"},
            {"php-version":"8.1","wordpress-version":"6.1","woocommerce-version":"7.4.1"},
            {"php-version":"8.2","wordpress-version":"6.2","woocommerce-version":"7.8.2"},
            {"php-version":"8.2","wordpress-version":"6.3","woocommerce-version":"7.9.0"},
            {"php-version":"8.2","wordpress-version":"6.3","woocommerce-version":"8.0.3"},
            {"php-version":"8.2","wordpress-version":"6.3","woocommerce-version":"8.1.0"},
            {"php-version":"8.3","wordpress-version":"6.5","woocommerce-version":"8.9.1"},
            {"php-version":"8.3","wordpress-version":"6.6","woocommerce-version":"9.1.0"},
            {"php-version":"8.4","wordpress-version":"6.7","woocommerce-version":"9.4.2"},
            {"php-version":"8.4","wordpress-version":"6.8","woocommerce-version":"9.8.2"},
            {"php-version":"8.4","wordpress-version":"6.8","woocommerce-version":"10.0.2"},
            {"php-version":"8.4","wordpress-version":"6.9","woocommerce-version":"10.3.6"},
            {"php-version":"8.4","wordpress-version":"6.9","woocommerce-version":"10.4.3"},
            {"php-version":"8.5","wordpress-version":"6.9","woocommerce-version":"10.5.3"},
            {"php-version":"8.5","wordpress-version":"6.9","woocommerce-version":"10.6.0","latest":true}
          ]'
          REDUCED_VERSIONS='[
            {"php-version":"8.0","wordpress-version":"5.9.5","woocommerce-version":"6.9.4"},
            {"php-version":"8.1","wordpress-version":"6.1","woocommerce-version":"7.4.1"},
            {"php-version":"8.2","wordpress-version":"6.3","woocommerce-version":"8.1.0"},
            {"php-version":"8.3","wordpress-version":"6.6","woocommerce-version":"9.1.0"},
            {"php-version":"8.4","wordpress-version":"6.8","woocommerce-version":"10.0.2"},
            {"php-version":"8.5","wordpress-version":"6.9","woocommerce-version":"10.6.0","latest":true}
          ]'

          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSIONS="$FULL_VERSIONS"
            FAIL_FAST=false
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.matrix }}" = "full" ]; then
            VERSIONS="$FULL_VERSIONS"
            FAIL_FAST=false
          else
            VERSIONS="$REDUCED_VERSIONS"
            FAIL_FAST=true
          fi

          echo "versions=$(echo "$VERSIONS" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "fail-fast=$FAIL_FAST" >> "$GITHUB_OUTPUT"

  ci-current:
    needs: resolve-matrix
    runs-on: ubuntu-22.04
    strategy:
      max-parallel: 15
      fail-fast: ${{ needs.resolve-matrix.outputs.fail-fast == 'true' }}
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.versions) }}

    name: woo v${{ matrix.woocommerce-version }}, wp v${{ matrix.wordpress-version }} @ php v${{ matrix.php-version }}

    env:
      PLUGIN_DIR: ${{ github.workspace }}/src/wc-easycredit
      BASE_URL: http://localhost:8888
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EASYCREDIT_PAYMENT_API: true

    steps:
      - name: Checkout
        uses: actions/checkout@master
      - name: Setup NodeJs
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install wp-env
        shell: bash
        run: npm -g i @wordpress/env
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, curl, dom, mbstring, intl, xml, zip, apcu, opcache
          tools: composer:2.1.5
          coverage: none
          ini-values: error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT"
      - name: Debug
        run: |
          php -v
          php -i
          env
          node -v
          echo "EASYCREDIT_PAYMENT_API=${EASYCREDIT_PAYMENT_API:-unset}"
      - name: Install Dependencies
        run: |
          npm install --global pnpm
          npm install --frozen-lockfile
      - name: Install Wordpress & wooCommerce
        run: |
          node -e 'console.log(JSON.stringify({"core": "WordPress/WordPress#${{ matrix.wordpress-version }}", "phpVersion": "${{ matrix.php-version }}", "lifecycleScripts":{}}, null, 2));' > .wp-env.override.json
          wp-env start

          composer require \
            php-stubs/wordpress-stubs:v${{ matrix.wordpress-version }} \
            php-stubs/woocommerce-stubs:v${{ matrix.woocommerce-version }}

          composer install -n

          # run setup script standalone, was not reliably executed as lifecycle script
          VERSION=${{ matrix.woocommerce-version }} node ./scripts/setup-woocommerce.js

          echo '{"api_details":"","api_key":"${{ secrets.EASYCREDITAPIKEY }}","api_token":"${{ secrets.EASYCREDITAPIPASSWORD }}","api_signature":"${{ secrets.EASYCREDITAPISIGNATURE }}","api_verify_credentials":"","debug":"yes","marketing_intro":"","marketing_components_express_checkout":"","express_checkout_detail_enabled":"yes","express_checkout_cart_enabled":"yes","marketing_components_widget":"","widget_enabled":"yes","widget_selector":".product .summary .price","cart_widget_enabled":"yes","cart_widget_selector":".wc-proceed-to-checkout","marketing_components_modal":"","modal_enabled":"no","modal_delay":"10","modal_snooze_for":"10","modal_src":"","marketing_components_card":"","card_enabled":"no","card_search_enabled":"no","card_position":"1","card_src":"","marketing_components_flashbox":"","flashbox_enabled":"no","flashbox_src":"","marketing_components_bar":"","bar_enabled":"no","transactions":"","mark_shipped":"no","mark_shipped_status":"wc-completed","mark_refunded":"no","mark_refunded_status":"wc-refunded","clickandcollect_intro":"","marketing_components_clickandcollect":"","clickandcollect_shipping_method":""}' | wp-env run cli wp option set woocommerce_easycredit_settings --format=json
          echo '{"enabled": "yes"}' | wp-env run cli wp option set woocommerce_easycredit_ratenkauf_settings --format=json
          echo '{"enabled": "yes"}' | wp-env run cli wp option set woocommerce_easycredit_rechnung_settings --format=json
      - name: Static Analyze
        if: false
        run: |
          cd $PLUGIN_DIR
          php vendor/bin/phpstan analyze .
      - name: Setup Playwright
        run: npx playwright install chromium
      - name: Playwright E2E Tests
        env:
          EASYCREDIT_PAYMENT_API: true
        run: |
          cd $GITHUB_WORKSPACE

          VERSION=${{ matrix.woocommerce-version }} npx playwright test -c tests/
      - name: Compat E2E (latest matrix only)
        if: ${{ matrix.latest == true }}
        env:
          EASYCREDIT_PAYMENT_API: true
        run: node scripts/compat/run.js
      - name: Save Logs for Debugging
        if: always()
        run: |
          LOG_DIR="playwright-report/logs"
          WP_CONTENT_DIR="/var/www/html/wp-content"

          mkdir -p "$LOG_DIR"
          > "$LOG_DIR/index.html"

          if wp-env run cli -- sh -lc "test -f \"$WP_CONTENT_DIR/debug.log\""; then
            wp-env run cli -- sh -lc "cat \"$WP_CONTENT_DIR/debug.log\"" > "$LOG_DIR/debug.log"
          fi

          while IFS= read -r remote_log; do
            [ -n "$remote_log" ] || continue
            log_name=$(basename "$remote_log")
            wp-env run cli -- sh -lc "cat \"$remote_log\"" > "$LOG_DIR/$log_name" || true
          done < <(wp-env run cli -- sh -lc "ls -1 \"$WP_CONTENT_DIR/uploads/wc-logs\"/*.log 2>/dev/null || true")

          for i in "$LOG_DIR"/*; do
            [ -f "$i" ] || continue
            f=$(basename "$i")
            echo "<a href=\"$f\">$f</a><br />" >> "$LOG_DIR/index.html"
          done
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.woocommerce-version }}
          path: playwright-report/
          if-no-files-found: warn

  deploy-report:
    name: Deploy Playwright reports
    needs: [resolve-matrix, ci-current]
    if: ${{ always() && needs.ci-current.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all Playwright reports
        id: download-reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: artifacts
      - name: Build combined report site
        id: build-site
        run: |
          shopt -s nullglob
          mkdir -p site

          if [ ! -d artifacts ] || [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "No Playwright reports found to deploy."
            exit 0
          fi

          for report_dir in artifacts/playwright-report-*; do
            version="${report_dir#artifacts/playwright-report-}"
            cp -R "$report_dir" "site/$version"
          done

          if [ ! "$(ls -A site)" ]; then
            echo "No Playwright reports found to deploy."
            exit 0
          fi

          echo "has_reports=true" >> "$GITHUB_OUTPUT"

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en"><head><meta charset="utf-8">'
            echo '<title>easyCredit Playwright Reports</title>'
            echo '<style>body{font-family:sans-serif;max-width:48rem;margin:2rem auto;padding:0 1rem}'
            echo 'ul{line-height:1.8}</style></head><body>'
            echo '<h1>easyCredit Playwright Reports</h1><ul>'
            for version_dir in site/*/; do
              version="$(basename "$version_dir")"
              echo "<li><a href=\"$version/\">WooCommerce $version</a></li>"
            done
            echo '</ul></body></html>'
          } > site/index.html
      - name: Deploy Report
        if: steps.build-site.outputs.has_reports == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/ --project-name=easycredit-playwright-reports
